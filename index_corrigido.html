
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Controle Uber PRO</title>
<style>
body {
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}
.card {
background:#111827;
padding:25px;
border-radius:12px;
width:320px;
}
input {
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:8px;
border-radius:8px;
border:none;
}
button {
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
margin-top:8px;
}
#msg {margin-top:10px;font-size:14px;}
</style>
</head>
<body>

<div class="card">
<h2>Login</h2>

<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="senha">

<button onclick="login()">Entrar</button>

<div id="msg"></div>
</div>

<script>

const SUPABASE_URL = "https://xoqlgwjpmdkiazwpwhmn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcWxnd2pwbWRraWF6d3B3aG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NjY1OTksImV4cCI6MjA4NzU0MjU5OX0.txohC3MvvEDaCCVRouVPDrmVaAO1PJxY0LawUttj9PA";

async function login(){
const email=document.getElementById("email").value;
const pass=document.getElementById("pass").value;

const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY
},
body:JSON.stringify({
email:email,
password:pass
})
});

const data = await res.json();

if(data.access_token){
localStorage.setItem("sb_token",data.access_token);
location.href="painel.html";
}
else{
document.getElementById("msg").innerText="Erro no login";
}
}

</script>

</body>
</html>
