<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg,#0f172a 0%, #111827 100%); font-family:system-ui,Arial,sans-serif; color:#fff; padding:18px; }
.card { width:min(420px,100%); background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:18px; box-shadow:0 12px 40px rgba(0,0,0,.35); }

.value { font-size:18px; font-weight:700; margin-top:4px; }

.row>* { flex:1; }
button.action { width:100%; padding:12px; border-radius:10px; border:none; font:inherit; font-weight:700; background:rgba(34,197,94,.25); color:#eafff3; border:1px solid rgba(34,197,94,.40); }
button.secondary { background:rgba(255,255,255,.06); color:#fff; border:1px solid rgba(255,255,255,.14); }
#msg { margin-top:10px; padding:10px; border-radius:10px; display:none; background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.10); font-size:13px; line-height:1.35; }
.danger { background:rgba(239,68,68,.10)!important; border-color:rgba(239,68,68,.45)!important; }
.small { font-size:12px; opacity:.9; margin-top:8px; }

.version-debug-badge{
  position:fixed;
  right:10px;
  bottom:10px;
  z-index:2147483647;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(15,23,42,.88);
  color:#fff;

</style>
</head>
<body>
<div class="card">
  <h1>MetaDriver</h1>
  <div class="muted">Seu acesso e teste aparecem aqui. O app fica separado e intacto.</div>
  <div class="info"><div class="label">Status da conta</div><div class="value" id="statusValue">Carregando...</div></div>
  <div class="info"><div class="label">Plano atual</div><div class="value" id="planValue">-</div></div>
  <div class="info"><div class="label">Dias restantes do teste</div><div class="value" id="daysValue">-</div></div>
  <div class="info"><div class="label">Validade</div><div class="value" id="endValue">-</div></div>
  <div id="expiredNotice" class="info danger" style="display:none;"><div class="label">Conta expirada</div><div class="value" style="font-size:16px;">Seu acesso expirou. Renove para continuar usando o aplicativo.</div></div>
  <div id="msg"></div>
  <div class="row">
    <button class="action" id="openAppBtn" type="button">Voltar</button>
  </div>
  <!-- vBeta1.63 - renovação automatizada via Pix (Asaas); o WhatsApp deixou de
       ser canal de assinatura e virou apenas suporte. Esta página é a única
       porta de renovação para conta bloqueada (o login barra antes do app). -->
  <div id="renovarBox" style="display:none;margin-top:14px;text-align:left;">
    <label style="display:block;margin-bottom:6px;font-size:13px;opacity:.85;">CPF (necessário para gerar o Pix)</label>
    <input id="cpfInput" type="text" inputmode="numeric" placeholder="Somente números" style="width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;font:inherit;margin-bottom:10px;" />
    <button class="action" id="assinarBtn" type="button">Assinar agora com Pix</button>
    <div id="assinarErro" style="display:none;color:#f87171;font-size:13px;margin-top:8px;"></div>
  </div>
  <div class="row">
    <button class="secondary action" id="suporteBtn" type="button">Falar com o suporte</button>
  </div>
</div>
<script>
(function(){
  var SUPABASE_URL = 'https://xoqlgwjpmdkiazwpwhmn.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcWxnd2pwbWRraWF6d3B3aG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NjY1OTksImV4cCI6MjA4NzU0MjU5OX0.txohC3MvvEDaCCVRouVPDrmVaAO1PJxY0LawUttj9PA';
  var LOGIN_PAGE = "login.html";
  var APP_PAGE = "app30_app.html?v=50";
  function $(id) { return document.getElementById(id); }
  function showMsg(text, kind) { var el=$("msg"); el.style.display="block"; el.className=""; if(kind) el.classList.add(kind); el.textContent=text; }
  function hideMsg() { var el=$("msg"); el.style.display="none"; el.className=""; el.textContent=""; }

  async function refreshSession() {
    var refreshToken = "";
    try { refreshToken = localStorage.getItem("sb_refresh_token") || ""; } catch(e) {}
    if (!refreshToken) return "";
    var res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    var txt = await res.text();
    var data = null; try { data = txt ? JSON.parse(txt) : null; } catch(e) { data = null; }
    if (res.ok && data && data.access_token) {
      try {
        localStorage.setItem("sb_token", data.access_token || "");
        localStorage.setItem("sb_refresh_token", data.refresh_token || refreshToken);
        localStorage.setItem("sb_expires_at", String(data.expires_at || 0));
      } catch(e) {}
      return data.access_token || "";
    }
    return "";
  }

  async function getToken() {
    try {
      var token = localStorage.getItem("sb_token") || "";
      var expiresAt = Number(localStorage.getItem("sb_expires_at") || 0);
      if (token && expiresAt * 1000 > Date.now() + 60000) return token;
      var renewed = await refreshSession();
      return renewed || token || "";
    } catch(e) { return ""; }
  }
  function api(path, method, body, token, extraHeaders) {
    var headers = {"apikey": SUPABASE_KEY, "Content-Type": "application/json", "Authorization": "Bearer " + SUPABASE_KEY};
    if(token) headers["Authorization"] = "Bearer " + token;
    if(extraHeaders){ for (var k in extraHeaders) headers[k] = extraHeaders[k]; }
    return fetch(SUPABASE_URL + path, { method: method, headers: headers, body: body ? JSON.stringify(body) : undefined })
      .then(function(res){
        return res.text().then(function(text){
          var data = null; try { data = text ? JSON.parse(text) : null; } catch(e) { data = { raw: text }; }
          if(!res.ok){
            var msg = (data && (data.msg || data.message || data.error_description || data.error)) ? (data.msg || data.message || data.error_description || data.error) : ("HTTP " + res.status);
            throw new Error(msg);
          }
          return data;
        });
      });
  }
  function isExpired(iso) { if(!iso) return false; var t = new Date(iso).getTime(); return isFinite(t) ? (Date.now() > t) : false; }
  function getDaysRemaining(iso) {
    if(!iso) return "-";
    var end = new Date(iso).getTime(), now = Date.now();
    var days = Math.ceil((end - now) / 86400000);
    if(days < 0) days = 0;
    return String(days);
  }
  function getUser(token) { return api("/auth/v1/user", "GET", null, token); }
  function getAccess(userId, token) { return api("/rest/v1/user_access?select=*&user_id=eq." + encodeURIComponent(userId), "GET", null, token, {"Accept":"application/json"}).then(function(rows){ return (Array.isArray(rows) && rows.length) ? rows[0] : null; }); }
  function updateAccess(userId, token, patch) { return api("/rest/v1/user_access?user_id=eq." + encodeURIComponent(userId), "PATCH", patch, token, {"Prefer":"return=representation","Accept":"application/json"}); }
  async function loadPanel() {
    hideMsg();
    var token = await getToken();
    if(!token) { location.replace(LOGIN_PAGE); return; }
    try {
      var user = await getUser(token);
      var access = await getAccess(user.id, token);
      if(!access) { showMsg("Acesso não encontrado. Faça login novamente.", "danger"); return; }
      if(access.status === "trial" && access.trial_end && isExpired(access.trial_end)) {
        await updateAccess(user.id, token, { status: "blocked" });
        access.status = "blocked";
      }
      $("statusValue").textContent = access.status;
      $("daysValue").textContent = access.status === "trial" ? getDaysRemaining(access.trial_end) : "-";
      $("endValue").textContent = access.status === "active" && access.access_until
        ? new Date(access.access_until).toLocaleString("pt-BR")
        : (access.trial_end ? new Date(access.trial_end).toLocaleString("pt-BR") : "-");
      var assinaturaEmDia = access.status === "active" && access.access_until && !isExpired(access.access_until);
      if(!assinaturaEmDia){
        $("renovarBox").style.display = "block";
        if(access.cpf) $("cpfInput").value = String(access.cpf);
      }
      if(access.status === "blocked") showMsg("Seu acesso expirou. Assine abaixo para reativar na hora.", "danger");
      window.__mdUser = user;
    } catch(e) {
      showMsg(e.message || "Erro ao carregar painel.", "danger");
    }
  }
  $("openAppBtn").addEventListener("click", function(){ location.href = APP_PAGE; }, true);
  $("suporteBtn").addEventListener("click", function(){ window.open("https://wa.me/5521920075291", "_blank"); }, true);
  $("assinarBtn").addEventListener("click", async function(){
    var erroEl = $("assinarErro"); erroEl.style.display = "none"; erroEl.textContent = "";
    var cpf = ($("cpfInput").value || "").replace(/\D/g, "");
    if(cpf.length !== 11){ erroEl.textContent = "Digite um CPF válido, só números."; erroEl.style.display = "block"; return; }
    var btn = $("assinarBtn");
    try{
      var token = await getToken();
      var user = window.__mdUser;
      if(!token || !user){ erroEl.textContent = "Sessão expirada. Faça login novamente."; erroEl.style.display = "block"; return; }
      btn.disabled = true; btn.textContent = "Gerando cobrança...";
      var resp = await fetch(SUPABASE_URL + "/functions/v1/criar-assinatura", {
        method: "POST",
        headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ userId: user.id, nome: (user.user_metadata && user.user_metadata.nome) || "Motorista MetaDriver", cpf: cpf, email: user.email || "" })
      });
      var data = null; try{ data = await resp.json(); }catch(e){ data = null; }
      if(!resp.ok || !data){ erroEl.textContent = "Não foi possível gerar a cobrança agora. Tente novamente em instantes."; erroEl.style.display = "block"; return; }
      if(data.invoiceUrl){
        window.open(data.invoiceUrl, "_blank");
        showMsg("Cobrança gerada. Finalize o pagamento na aba que abriu; o acesso libera automaticamente após a confirmação.");
      }else{
        showMsg("Assinatura criada. Aguarde a confirmação do pagamento.");
      }
    }catch(e){
      erroEl.textContent = "Não foi possível gerar a cobrança agora. Tente novamente em instantes."; erroEl.style.display = "block";
    }finally{
      btn.disabled = false; btn.textContent = "Assinar agora com Pix";
    }
  }, true);
  loadPanel();
})();
</script>
<div class="version-debug-badge" id="versionDebugBadge">MetaDriver vBeta1.63 · painel</div>
</body>
