<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Controle Uber PRO</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(180deg,#0f172a 0%, #111827 100%);
  font-family:Arial,Helvetica,sans-serif; color:#fff; padding:20px;
}
.wrap{
  width:min(420px,100%);
  text-align:center;
}
.logo{
  font-size:30px; font-weight:800; margin-bottom:14px;
}
.sub{
  opacity:.86; line-height:1.4; margin-bottom:18px; font-size:14px;
}
button{
  width:100%; padding:14px 16px; border:none; border-radius:14px; font:inherit; font-weight:700;
}
#installBtn{ background:#22c55e; color:#0b1220; }
#openLoginBtn{ background:rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.14); margin-top:10px; display:none; }
.note{ margin-top:12px; font-size:12px; opacity:.8; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🚗 Controle Uber PRO</div>
  <div class="sub">Instale o aplicativo para usar da forma correta.</div>
  <button id="installBtn" type="button">Instalar aplicativo</button>
  <button id="openLoginBtn" type="button">Entrar</button>
  <div class="note">Se o botão de instalar não aparecer, use o Chrome e abra o menu para instalar.</div>
</div>

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('openLoginBtn').style.display = 'block';
});

window.addEventListener('appinstalled', function(){
  deferredPrompt = null;
  location.href = 'login.html';
});

document.getElementById('installBtn').addEventListener('click', async function(){
  if(!deferredPrompt){
    alert('Abra no Chrome e aguarde a opção de instalar.');
    return;
  }
  deferredPrompt.prompt();
  try{ await deferredPrompt.userChoice; }catch(e){}
}, true);

document.getElementById('openLoginBtn').addEventListener('click', function(){
  location.href = 'login.html';
}, true);

// If opened as installed app, go through normal auth flow
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  location.href = 'app30_app.html';
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  });
}
</script>
</body>
</html>
